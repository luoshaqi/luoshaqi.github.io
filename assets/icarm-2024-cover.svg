      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="90%" cy="70%" r="85%">
      <stop offset="0" stop-color="#48afef" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#48afef" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
